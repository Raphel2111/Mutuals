version: '3.9'

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mutuals
      POSTGRES_USER: mutuals
      POSTGRES_PASSWORD: mutuals_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mutuals" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Mutuals/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      DATABASE_URL: postgresql://mutuals:mutuals_dev_pw@db:5432/mutuals
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-replace-in-prod
      ALLOWED_HOSTS: "localhost,127.0.0.1"
    volumes:
      - ./Mutuals/backend:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 evento_app.asgi:application"

  frontend:
    build:
      context: ./Mutuals/frontend_web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  media_data:
